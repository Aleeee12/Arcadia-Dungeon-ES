modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Blushister"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="arcadia_core"
    type="required"
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="luckperms"
    type="optional"
    versionRange="*"
    ordering="NONE"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="spark"
    type="optional"
    versionRange="*"
    ordering="NONE"
    side="SERVER"
